<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#021124" />
      <stop offset="50%" stop-color="#002447" />
      <stop offset="100%" stop-color="#003566" />
    </linearGradient>
    
    <!-- Glow and Shadow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.5" />
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#0078d4" flood-opacity="0.3" />
    </filter>
    
    <!-- Logo Glow -->
    <filter id="logoGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0078d4" flood-opacity="0.5" />
    </filter>
  </defs>

  <!-- Base Squircle -->
  <rect x="16" y="16" width="224" height="224" rx="54" fill="url(#bgGrad)" stroke="#0078d4" stroke-width="2" filter="url(#glow)" />
  <rect x="18" y="18" width="220" height="220" rx="52" fill="none" stroke="rgba(255, 255, 255, 0.15)" stroke-width="1.5" />

  <!-- Inner Tagesschau Logo -->
  <g filter="url(#logoGlow)" fill="#ffffff" transform="translate(128, 128) scale(0.85) translate(-170.07, -170.15)">
    <path fill-rule="evenodd" clip-rule="evenodd" d="M202.51,202.88V122l-81.3,29.18v20.1l26.92-9.73v60.78 L202.51,202.88z M170.07,101.22c-38.07,0-68.92,30.86-68.92,68.93c0,38.07,30.85,68.94,68.92,68.94 c38.07,0,68.94-30.87,68.94-68.94C239.01,132.08,208.14,101.22,170.07,101.22z M170.07,89.38c44.63,0,80.8,36.17,80.8,80.78 c0,44.61-36.17,80.79-80.8,80.79c-44.61,0-80.78-36.19-80.78-80.79C89.29,125.54,125.46,89.38,170.07,89.38z" />
  </g>
</svg>
